// ---------- Detecção de leito (porte direto de lib/leito-parser.ts) ----------

const NUMEROS_EXTENSO = {
  um:1, uma:1, dois:2, duas:2, tres:3, 'três':3, quatro:4, cinco:5, seis:6, sete:7, oito:8, nove:9,
  dez:10, onze:11, doze:12, treze:13, catorze:14, quatorze:14, quinze:15, dezesseis:16, dezessete:17,
  dezoito:18, dezenove:19, vinte:20, trinta:30, quarenta:40, cinquenta:50,
};

function detectarLeito(texto){
  const match = texto.match(/\b(?:e?leito)\s+([^\s,;:.]+)/i);
  if(!match || match.index === undefined) return null;
  const porExtenso = NUMEROS_EXTENSO[match[1].toLowerCase()];
  const leito = `Leito ${porExtenso ?? match[1]}`;
  let resto = (texto.slice(0, match.index) + texto.slice(match.index + match[0].length))
    .replace(/^[\s,;:.\-]+/, '').trim();
  if(!resto) resto = '(sem detalhes adicionais)';
  return { leito, resto };
}

// ---------- Prompts de sistema (porte direto de lib/prompts.ts) ----------

const REGRAS_COMUNS = `REGRAS OBRIGATÓRIAS, sem exceção:
1. Use SOMENTE as informações fornecidas abaixo. Nunca invente sinal vital, evento, procedimento, medicação ou intercorrência que não esteja nos dados.
2. Você PODE traduzir linguagem informal para terminologia técnica de enfermagem (ex: "falta de ar" -> "dispneia"), desde que seja o mesmo fato clínico, sem grau de certeza maior. Você NÃO PODE inferir um achado clínico novo a partir de uma descrição vaga.
3. Não sugira conduta médica, prescrição ou recomendação clínica nova além do que já foi registrado pelo enfermeiro.
4. Todas as seções do modelo devem SEMPRE aparecer, na ordem do modelo. Se faltar dado, escreva "Sem registro para esta seção neste turno" — nunca omita a seção, nunca preencha com suposição.
5. RASTREABILIDADE OBRIGATÓRIA: após cada trecho que descreva um fato clínico, cite entre colchetes o horário exato do evento de origem [HH:MM], usando apenas horários fornecidos.
6. DISPOSITIVOS: se houver sonda, cateter, dreno, acesso venoso, tubo, destaque em linha própria com tipo/local/horário — sem inventar o que não foi dito.

8. Tom técnico, objetivo, terceira pessoa, como redigido em prontuário.
9. FORMATO TEXTO PURO OBRIGATÓRIO — proibido qualquer símbolo de markdown (#, **, *, _, >, crase, listas com hífen).
10. Responda apenas com o texto do documento, sem comentário antes ou depois.
11. Termine sempre com a linha: "Documento estruturado a partir dos registros do enfermeiro — revisar e assinar (COREN) antes de inserir no prontuário oficial."

REGRAS OBRIGATÓRIAS, sem exceção:

// ---------- Chamada ao Claude embutida no artifact ----------

async function askClaude(systemPrompt, userPrompt){
  if(!window.claude || typeof window.claude.complete !== 'function'){
    throw new Error('API do artifact indisponível neste ambiente');
  }
  const fullPrompt = `${systemPrompt}\n\n---\n\nDADOS:\n${userPrompt}`;
  const text = await window.claude.complete(fullPrompt);
  return (text || '').trim();
}

function montarDadosPaciente(p){
  const evs = turno.eventos.filter(e => e.patientId === p.id).sort((a,b)=>a.ts-b.ts);
  const linhas = [
    `Leito: ${p.leito}`,
    `Diagnóstico principal informado: ${p.dx || '(não informado)'}`,
    `Complexidade: ${p.complexidade}`,
    '', 'Eventos registrados neste turno, em ordem cronológica:',
  ];
  if(evs.length === 0) linhas.push('(nenhum evento registrado)');
  else evs.forEach(e => linhas.push(`[${e.hora}] (${e.tipo}) ${e.texto}`));
  return linhas.join('\n');
}

function montarDadosRelatorioFinal(){
  const ordenados = [...turno.pacientes].sort((a,b)=>ORDEM_COMPLEXIDADE.indexOf(a.complexidade)-ORDEM_COMPLEXIDADE.indexOf(b.complexidade));
  const blocos = ordenados.map(p=>{
    const evs = turno.eventos.filter(e=>e.patientId===p.id).sort((a,b)=>a.ts-b.ts);
    const linhas = [`=== ${p.leito} ===`, `Complexidade: ${p.complexidade}`, 'Eventos:'];
    if(evs.length===0) linhas.push('(nenhum evento registrado)');
    else evs.forEach(e=>linhas.push(`[${e.hora}] ${e.texto}`));
    return linhas.join('\n');
  });
  const semLeito = turno.eventos.filter(e=>!e.patientId).sort((a,b)=>a.ts-b.ts);
  if(semLeito.length>0) blocos.push(['=== NOTAS GERAIS (sem leito identificado) ===', ...semLeito.map(e=>`[${e.hora}] ${e.texto}`)].join('\n'));
  return blocos.join('\n\n');
}

// Mesma fórmula do componente Highlight do Animate UI (registry/primitives/
// effects/highlight): bounds do item ativo menos bounds do container, sem
// transform — left/width numéricos e explícitos, sem posição "auto" ambígua.
function posicionarIndicador(){
  const nav = document.querySelector('.bottom-nav');
  const indicador = document.getElementById('navIndicator');
  if(!nav || !indicador) return;
  const ativo = nav.querySelector('.nav-item.ativo');
  if(!ativo){ indicador.style.opacity = '0'; return; }
  const navRect = nav.getBoundingClientRect();
  const itemRect = ativo.getBoundingClientRect();
  indicador.style.opacity = '1';
  indicador.style.width = itemRect.width + 'px';
  indicador.style.left = (itemRect.left - navRect.left) + 'px';
}

  turno.pacientes.push({ id: uid(), leito, dx, complexidade });

}
function removerPaciente(id){
  turno.pacientes = turno.pacientes.filter(p=>p.id!==id);
  turno.eventos = turno.eventos.filter(e=>e.patientId!==id);
  render();
}
function atualizarComplexidade(id, complexidade){
  const p = turno.pacientes.find(p=>p.id===id);
  if(p) p.complexidade = complexidade;
  render();

let registrarTexto = '';
let registrarContextoId = '';
let reconhecendo = false;
let reconhecimento = null;

function renderRegistrar(){
  const deteccaoAoVivo = registrarTexto.trim() ? detectarLeito(registrarTexto) : null;

        <button class="btn-mic${reconhecendo?' ativo':''}" id="micBtn" type="button" onclick="toggleDitado()" aria-label="Ditar por voz" title="Ditar por voz">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
      <textarea id="registrarTextarea" class="captura-textarea" aria-label="Registrar nota do plantão"
        placeholder='Dite ou escreva: "leito 5, PA 130x80, dor 3/10"&#10;O leito é detectado automaticamente pelo contexto.'
        rows="3" oninput="registrarTexto=this.value; atualizarPreviewRegistrar()">${escapeHtml(registrarTexto)}</textarea>
      <div class="captura-preview" id="capturaPreview">${previewRegistrar(deteccaoAoVivo, pacienteContexto)}</div>
      <div class="captura-acoes">
        <button class="btn btn-primario" style="flex:1" onclick="handleCapturar()" ${!registrarTexto.trim()?'disabled':''}>Adicionar</button>
        <button class="btn btn-secundario" style="padding:10px 14px" onclick="registrarTexto='';render()" ${!registrarTexto?'disabled':''} aria-label="Limpar">✕</button>
      </div>

    ${eventosOrdenados.length===0 ? '<div class="estado-vazio">Nenhum registro neste turno.</div>' : `
      <div class="sessoes-header"><span class="sessoes-titulo">${turno.eventos.length} registro${turno.eventos.length!==1?'s':''} neste turno</span></div>

}

function previewRegistrar(deteccaoAoVivo, pacienteContexto){
  if(deteccaoAoVivo) return `→ será associado a: ${deteccaoAoVivo.leito}`;
  if(pacienteContexto && registrarTexto.trim()) return `→ contexto: ${pacienteContexto.leito}`;
  if(registrarTexto.trim()) return '→ nota geral (sem leito detectado)';
  return '';
}

function atualizarPreviewRegistrar(){
  const deteccaoAoVivo = registrarTexto.trim() ? detectarLeito(registrarTexto) : null;
  const pacienteContexto = turno.pacientes.find(p=>p.id===registrarContextoId) || null;
  const preview = document.getElementById('capturaPreview');
  if(preview) preview.textContent = previewRegistrar(deteccaoAoVivo, pacienteContexto);
  const wrapper = document.getElementById('registrarTextarea')?.closest('.captura-wrapper');
  const ativo = registrarTexto.length>0 || reconhecendo;
  if(wrapper) wrapper.classList.toggle('ativa', ativo);
  document.querySelector('.captura-dot')?.classList.toggle('pulsando', ativo);
  const label = document.querySelector('.captura-label');
  if(label){
    label.classList.toggle('ativa', ativo);
    label.textContent = reconhecendo ? 'Ouvindo' : (registrarTexto.length>0 ? 'Capturando' : 'Aguardando');
  }
  const btnAdd = document.querySelector('.captura-acoes .btn-primario');
  const btnLimpar = document.querySelector('.captura-acoes .btn-secundario');
  if(btnAdd) btnAdd.disabled = !registrarTexto.trim();
  if(btnLimpar) btnLimpar.disabled = !registrarTexto;
}

// ---------- Ditado por voz (Web Speech API — só onde o navegador suporta) ----------

function getSpeechRecognition(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function toggleDitado(){
  const SR = getSpeechRecognition();
  if(!SR){
    // Safari/iOS não expõe essa API — o caminho real ali é o microfone do
    // próprio teclado do celular, então só focamos o campo e avisamos.
    document.getElementById('registrarTextarea')?.focus();
    avisarDitadoIndisponivel();
    return;
  }
  if(reconhecendo){
    reconhecimento && reconhecimento.stop();
    return;
  }
  reconhecimento = new SR();
  reconhecimento.lang = 'pt-BR';
  reconhecimento.continuous = false;
  reconhecimento.interimResults = false;
  reconhecimento.onstart = () => { reconhecendo = true; atualizarPreviewRegistrar(); };
  reconhecimento.onerror = () => { reconhecendo = false; atualizarPreviewRegistrar(); };
  reconhecimento.onend = () => { reconhecendo = false; atualizarPreviewRegistrar(); };
  reconhecimento.onresult = (e) => {
    const texto = Array.from(e.results).map(r => r[0].transcript).join(' ').trim();
    if(!texto) return;
    registrarTexto = registrarTexto.trim() ? registrarTexto.trim() + ' ' + texto : texto;
    const ta = document.getElementById('registrarTextarea');
    if(ta) ta.value = registrarTexto;
    atualizarPreviewRegistrar();
  };
  reconhecimento.start();
}

function avisarDitadoIndisponivel(){
  const preview = document.getElementById('capturaPreview');
  if(!preview) return;
  const original = preview.textContent;
  preview.textContent = '🎤 Ditado automático indisponível aqui — toque no microfone do teclado do seu celular.';
  setTimeout(() => { if(preview.textContent.startsWith('🎤')) atualizarPreviewRegistrar(); }, 3200);
}

function renderSessaoCard(ev, i){
  const paciente = turno.pacientes.find(p=>p.id===ev.patientId);
  const estaOrganizando = organizandoIds.includes(ev.id);
  const temConferir = ev.texto.includes('(CONFERIR');
  const estilo = `animation-delay:${(i||0)*40}ms${temConferir?';border-color:var(--color-warn)':''}`;
  return `
    <div class="sessao-card item-in" style="${estilo}">
      <div class="sessao-card-header">
        <span class="sessao-hora-pill">${ev.hora}</span>
        ${paciente ? `<span class="sessao-leito-pill">${escapeHtml(paciente.leito)}</span>` : `<span class="sessao-sem-leito-pill">⚠ sem leito</span>`}
        <span class="sessao-tipo-pill">${ev.tipo}</span>
        ${temConferir ? `<span class="sessao-sem-leito-pill" title="Contém trecho ambíguo — conferir">⚠ conferir</span>` : ''}

          </button>
        </div>
      </div>
      <p class="sessao-texto"${estaOrganizando?' style="opacity:.55"':''}>${escapeHtml(ev.texto)}</p>
      ${estaOrganizando ? `<div style="font-size:.74rem;color:var(--color-ink-faint);margin-top:4px">Organizando registro…</div>` : ''}
      ${ev.textoOriginal ? `<div style="margin-top:6px"><span style="font-size:.74rem;color:var(--color-ink-faint);font-style:italic">original: ${escapeHtml(ev.textoOriginal)}</span></div>` : ''}
    </div>
  `;
}

function excluirEvento(id){
  turno.eventos = turno.eventos.filter(e=>e.id!==id);
  render();
}

function handleCapturar(){
  const t = registrarTexto.trim();
  if(!t) return;
  const deteccao = detectarLeito(t);
  const textoCru = deteccao ? deteccao.resto : t;
  const eventoId = uid();

  if(deteccao){
    let p = turno.pacientes.find(x=>x.leito.toLowerCase()===deteccao.leito.toLowerCase());
    if(!p){ p = { id: uid(), leito: deteccao.leito, dx:'', complexidade:'intermediarios' }; turno.pacientes.push(p); }
    turno.eventos.push({ id: eventoId, patientId: p.id, tipo:'Nota', texto: textoCru, hora: horaAgora(), ts: Date.now() });
    registrarContextoId = p.id;
  } else {
    const patientId = (registrarContextoId && turno.pacientes.some(p=>p.id===registrarContextoId)) ? registrarContextoId : null;
    turno.eventos.push({ id: eventoId, patientId, tipo:'Nota', texto: textoCru, hora: horaAgora(), ts: Date.now() });
  }

  registrarTexto = '';
  render();
  if(textoCru.trim()) organizarRegistro(eventoId, textoCru);
}

async function organizarRegistro(eventoId, textoCru){
  organizandoIds.push(eventoId);
  if(currentView==='registrar') render();
  try{
    const organizado = await askClaude(PROMPT_ORGANIZAR_REGISTRO, textoCru);
    const ev = turno.eventos.find(e=>e.id===eventoId);
    if(ev && ev.texto === textoCru && organizado && organizado !== textoCru){
      ev.texto = organizado;
      ev.textoOriginal = textoCru;
    }
  }catch(e){
    const ev = turno.eventos.find(e=>e.id===eventoId);
    if(ev) ev.organizacaoFalhou = true;
  }finally{
    organizandoIds = organizandoIds.filter(id=>id!==eventoId);
    if(currentView==='registrar') render();
  }
}

const TIPOS_EVOLUCAO_AVULSA = ['Admissão','Alta','Transferência','Óbito','Sessão de hemodiálise','Pré-operatório','Pós-operatório imediato','Intercorrência isolada'];

function renderEvolucaoAvulsa(){
  return `

    </div>
    <div class="tela-header" style="padding-top:0"><span class="tela-titulo">Evolução avulsa</span></div>

      </select>
    </div>
    <div class="campo"><label>Dados / observações</label>
      <textarea id="avulsaDados" rows="6" placeholder="Descreva os achados e cuidados prestados. Só o que você observou/fez — nada é assumido." oninput="avulsaState.dados=this.value">${escapeHtml(avulsaState.dados)}</textarea>
    </div>
    <button class="btn btn-primario btn-bloco" onclick="gerarEvolucaoAvulsa()" ${avulsaState.carregando?'disabled':''}>
      ${avulsaState.carregando ? '<span class="spinner spinner-clinical"></span> Gerando…' : 'Gerar evolução'}
    </button>

    ${avulsaState.erro ? `<div class="errbox" style="margin-top:14px">${escapeHtml(avulsaState.erro)}</div>` : ''}
    ${avulsaState.resultado ? `
      <div class="sep"></div>
      <p class="card-titulo">Resultado</p>
      <textarea class="documento-area" readonly>${escapeHtml(avulsaState.resultado)}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px">

async function gerarEvolucaoAvulsa(){
  if(!avulsaState.dados.trim()){ avulsaState.erro = 'Descreva os dados antes de gerar.'; render(); return; }
  avulsaState.carregando = true; avulsaState.erro=''; avulsaState.resultado='';
  render();
  try{
    const texto = await askClaude(promptEvolucaoAvulsa(avulsaState.tipo), avulsaState.dados);
    avulsaState.resultado = texto;
  }catch(e){
    avulsaState.erro = 'Não foi possível gerar agora. (' + (e && e.message ? e.message : 'erro') + ')';
  }finally{
    avulsaState.carregando = false;
    render();
  }
}

        <div class="card">
          <label style="display:flex;align-items:flex-start;gap:8px;font-size:.85rem;margin-bottom:12px">
            <input type="checkbox" id="confirmoCopiei" style="margin-top:2px">
            Confirmo que copiei o documento acima. Encerrar apaga todos os pacientes e registros deste turno — não há como desfazer.
          </label>
          <div style="display:flex;gap:8px">
            <button class="btn btn-perigo" style="flex:1" onclick="confirmarEncerrar()">Confirmar</button>
            <button class="btn btn-secundario" onclick="evolucaoState.confirmandoEncerrar=false;render()">Cancelar</button>
          </div>
        </div>
      `}
    ` : ''}

    ${s.fase==='encerrado' ? `
      <div class="estado-vazio">
        <p style="font-weight:700;color:var(--color-ink);margin-bottom:8px">Plantão encerrado.</p>
        <button class="btn btn-primario" onclick="navegar('plantao')">Voltar ao início</button>
      </div>
    ` : ''}
  `;
}

async function processarPlantao(){
  evolucaoState = { fase:'processando', log:[], documento:'', erro:'' };
  render();
  try{
    const pacientesComEventos = turno.pacientes.filter(p=>turno.eventos.some(e=>e.patientId===p.id));
    const docs = [];
    for(const p of pacientesComEventos){
      evolucaoState.log.push(`→ ${p.leito}...`); render();
      const dados = montarDadosPaciente(p);
      const texto = await askClaude(promptDocumentoEvolucao(), dados);
      docs.push({ leito: p.leito, texto });
    }
    evolucaoState.log.push(`${docs.length} evolução(ões) gerada(s).`); render();

    evolucaoState.log.push('Gerando relatório final...'); render();
    const dadosRel = montarDadosRelatorioFinal();
    const relatorio = await askClaude(promptRelatorioFinal(), dadosRel);
    evolucaoState.log.push('Relatório final gerado.'); render();

    const partes = [
      '═══════════════════════════════════════', 'EVOLUÇÕES DE ENFERMAGEM', '═══════════════════════════════════════', '',
      ...docs.map(d=>`── ${d.leito} ──\n${d.texto}\n`),
      '═══════════════════════════════════════', 'RELATÓRIO FINAL — PASSAGEM DE PLANTÃO', '═══════════════════════════════════════', '',
      relatorio,
    ];
    evolucaoState.documento = partes.join('\n');
    evolucaoState.fase = 'pronto';
    render();
  }catch(e){
    evolucaoState.fase = 'inicial';
    evolucaoState.erro = 'Não foi possível concluir agora. (' + (e && e.message ? e.message : 'erro') + ')';
    render();
  }
}

function confirmarEncerrar(){
  const chk = document.getElementById('confirmoCopiei');
  if(!chk || !chk.checked) return;
  turno = { iniciadoEm: Date.now(), pacientes: [], eventos: [] };
  evolucaoState = { fase:'encerrado', log:[], documento:'', erro:'' };
  render();
}

function copiarTexto(texto, btn){
  navigator.clipboard.writeText(texto).then(()=>{
    const original = btn.textContent;
    btn.textContent = 'Copiado ✓';
    setTimeout(()=>{ btn.textContent = original; }, 1600);
  });
}
